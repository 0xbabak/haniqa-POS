<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>haniqa — Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .inv-product-block {
    margin-bottom: 4px;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .inv-product-row {
    display: grid;
    grid-template-columns: 100px 1fr 160px 90px;
    align-items: center;
    gap: 0;
    padding: 9px 14px;
    background: var(--card);
  }
  .inv-ref {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
  }
  .inv-name {
    font-size: 12px;
    color: var(--text-bright);
    font-weight: 500;
  }
  .inv-category {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    text-align: right;
    padding-right: 16px;
  }
  .inv-stock {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    text-align: right;
    color: var(--text-bright);
  }
  .inv-stock.zero { color: var(--red); opacity: 0.6; }
  .inv-stock.low  { color: var(--gold, #c9a84c); }

  @media (max-width: 600px) {
    .inv-product-row { grid-template-columns: 80px 1fr 70px; }
    .inv-category { display: none; }
  }
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- ── SIDEBAR ── -->
<nav class="sidebar">
  <div class="logo-block">
    <div class="logo">han<span class="pink-text">iq</span>a</div>
    <div class="logo-sub" style="color:var(--pink)">Retail Management System</div>
  </div>

  <div class="nav-section">
    <div class="nav-label">Point of Sale</div>
    <div class="nav-item" onclick="window.location='pos.html'">
      <span class="nav-icon">◉</span> POS Terminal
    </div>
    <div class="nav-item" onclick="window.location='pos.html#cashier'">
      <span class="nav-icon">◪</span> Cash Register
    </div>
    <div class="nav-item" onclick="window.location='pos.html#sales'">
      <span class="nav-icon">◈</span> Sales
    </div>

    <div class="nav-divider"></div>
    <div class="nav-label">Insights</div>
    <div class="nav-item" onclick="window.location='dashboard.html'">
      <span class="nav-icon">◈</span> Dashboard
    </div>
    <div class="nav-item" onclick="window.location='ai.html'">
      <span class="nav-icon">◻</span> Analytics
    </div>
    <div class="nav-item" onclick="window.location='ai.html#ai-chat'">
      <span class="nav-icon">◎</span> Chat with AI
    </div>

    <div class="nav-divider"></div>
    <div class="nav-label">Products</div>
    <div class="nav-item" onclick="window.location='catalogue.html'">
      <span class="nav-icon">◫</span> All Products
    </div>
    <div class="nav-item active">
      <span class="nav-icon">◧</span> Inventory
    </div>
  </div>

  <div class="sidebar-footer">
    <button class="theme-toggle" onclick="toggleTheme()">
      <span id="theme-icon">◐</span> <span id="theme-text">Light Mode</span>
    </button>
    <button class="theme-toggle" onclick="logout()" style="color: var(--red); margin-top: 6px">⇥ Sign Out</button>
  </div>
</nav>

<!-- ── MAIN ── -->
<div class="main">
  <div class="topbar">
    <button class="hamburger" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="topbar-title">Inventory</div>
  </div>

  <div class="page active" id="page-inventory" style="padding-bottom: 40px">
    <div class="section-head">
      <div class="section-title">Wholesale Inventory</div>
      <div class="section-line"></div>
      <div class="section-meta" id="inv-count-label">— products</div>
    </div>

    <!-- Controls -->
    <div style="display:flex; gap:8px; align-items:center; margin-bottom:16px; flex-wrap:wrap">
      <input type="text" class="search-box" id="inv-search" placeholder="Search by name or code…"
        oninput="renderInventory()" style="flex:1; min-width:160px">
      <span id="inv-sync-label" style="font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); white-space:nowrap"></span>
      <button id="inv-dia-sync-btn" onclick="syncInventoryFromDIA()"
        style="padding:7px 16px; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; background:transparent; border:1px solid rgba(201,168,76,0.5); color:#c9a84c; cursor:pointer; border-radius:2px; transition:all 0.2s"
        onmouseover="this.style.borderColor='#c9a84c'"
        onmouseout="this.style.borderColor='rgba(201,168,76,0.5)'">
        ⟳ Sync from DIA
      </button>
    </div>

    <!-- Column header -->
    <div style="display:grid; grid-template-columns:100px 1fr 160px 90px; padding:4px 14px; margin-bottom:4px">
      <span style="font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.12em; color:var(--text-dim); text-transform:uppercase">Code</span>
      <span style="font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.12em; color:var(--text-dim); text-transform:uppercase">Product</span>
      <span style="font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.12em; color:var(--text-dim); text-transform:uppercase; text-align:right; padding-right:16px">Category</span>
      <span style="font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.12em; color:var(--text-dim); text-transform:uppercase; text-align:right">Stock</span>
    </div>

    <!-- Inventory Table -->
    <div id="inventoryTable"></div>
  </div>
</div>

<script>
// ── AUTH + THEME ──
async function checkAuth() {
  const res = await fetch('/api/auth/me');
  if (!res.ok) { window.location.href = '/login.html'; throw new Error('unauth'); }
}
async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  sessionStorage.clear();
  window.location.href = '/login.html';
}
function toggleTheme() {
  document.body.classList.toggle('light-theme');
  const isLight = document.body.classList.contains('light-theme');
  document.getElementById('theme-icon').textContent = isLight ? '◑' : '◐';
  document.getElementById('theme-text').textContent = isLight ? 'Dark Mode' : 'Light Mode';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}
function toggleSidebar() {
  const s = document.querySelector('.sidebar');
  const o = document.getElementById('sidebar-overlay');
  const h = document.getElementById('hamburger-btn');
  const open = s.classList.contains('open');
  s.classList.toggle('open', !open);
  o.classList.toggle('open', !open);
  h.classList.toggle('open', !open);
}
function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
  document.getElementById('hamburger-btn').classList.remove('open');
}
function loadTheme() {
  if (localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light-theme');
    document.getElementById('theme-icon').textContent = '◑';
    document.getElementById('theme-text').textContent = 'Dark Mode';
  }
}

// ── STATE ──
let allProducts = [];

// ── DATA ──
async function loadProducts() {
  try {
    const res  = await fetch('/api/dia/inventory');
    if (res.status === 401) { window.location.href = '/login.html'; return; }
    if (res.ok) {
      const data = await res.json();
      if (data.products && data.products.length > 0) {
        allProducts = data.products;
        const lbl = document.getElementById('inv-sync-label');
        if (lbl && data.syncedAt) {
          const d = new Date(data.syncedAt + 'Z');
          lbl.textContent = `DIA · ${data.total} products · synced ${d.toLocaleString()}`;
        }
        return;
      }
    }
  } catch (_) {}
  const lbl = document.getElementById('inv-sync-label');
  if (lbl) lbl.textContent = 'Not synced — click Sync from DIA';
}

// ── RENDER ──
function renderInventory() {
  const q = (document.getElementById('inv-search').value || '').toLowerCase();
  const filtered = allProducts.filter(p =>
    p.name.toLowerCase().includes(q) || (p.ref || '').toLowerCase().includes(q)
  );

  document.getElementById('inv-count-label').textContent =
    `${filtered.length} product${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    document.getElementById('inventoryTable').innerHTML =
      `<div style="padding:60px 0; text-align:center; color:var(--text-dim); font-size:13px">No products found</div>`;
    return;
  }

  document.getElementById('inventoryTable').innerHTML = filtered.map(p => {
    const stock    = parseFloat(p.stock) || 0;
    const stockCls = stock === 0 ? 'zero' : stock < 10 ? 'low' : '';
    return `
      <div class="inv-product-block">
        <div class="inv-product-row">
          <span class="inv-ref">${p.ref || '—'}</span>
          <span class="inv-name">${p.name}</span>
          <span class="inv-category">${p.category || ''}</span>
          <span class="inv-stock ${stockCls}">${stock % 1 === 0 ? stock : stock.toFixed(1)}</span>
        </div>
      </div>`;
  }).join('');
}

// ── DIA SYNC ──
async function syncInventoryFromDIA() {
  const btn = document.getElementById('inv-dia-sync-btn');
  const lbl = document.getElementById('inv-sync-label');
  btn.disabled    = true;
  lbl.textContent = 'Syncing from DIA…';
  try {
    const res  = await fetch('/api/dia/sync', { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      lbl.textContent = `Synced — ${data.stockCount} products from DIA`;
      await loadProducts();
      renderInventory();
    } else {
      lbl.textContent = 'Sync failed: ' + (data.error || 'error');
    }
  } catch (err) {
    lbl.textContent = 'Error: ' + err.message;
  }
  btn.disabled = false;
}

// ── INIT ──
window.addEventListener('load', async () => {
  await checkAuth();
  loadTheme();
  await loadProducts();
  renderInventory();
});
</script>
</body>
</html>
